# Site do Banco Ágil para o nginx EXISTENTE da VPS.
#
# INSTALAÇÃO:
#   1. Copie este arquivo para o container nginx:
#        docker cp deploy/nginx-banco-agil.conf <nome-do-nginx>:/etc/nginx/conf.d/banco-agil.conf
#      Ou, se o nginx usa bind mount:
#        cp deploy/nginx-banco-agil.conf /caminho/do/host/conf.d/banco-agil.conf
#
#   2. Copie o build do frontend para o nginx:
#        docker cp frontend/dist/. <nome-do-nginx>:/usr/share/nginx/html/banco-agil/
#
#   3. Recarregue o nginx sem derrubar conexões:
#        docker exec <nome-do-nginx> nginx -s reload
#
# Para anexar o nginx à rede do backend:
#   docker network connect banco-agil-net <nome-do-nginx>

server {
    listen 80;
    # Substitua pelo seu domínio ou IP — use "_" para servir em qualquer Host
    server_name _;

    # Raiz do build estático do frontend
    root /usr/share/nginx/html/banco-agil;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 5m;

    # Proxy reverso: /api/* → backend FastAPI (container banco-agil-backend)
    location /api/ {
        proxy_pass http://banco-agil-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # SPA: qualquer rota cai no index (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets versionados pelo Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
