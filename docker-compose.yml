# Stack completa e self-contained do Banco Ágil.
#
# Serviços orquestrados (5 containers isolados, 1 rede interna):
#   qdrant    — memória vetorial de padrões aprendidos (ADR-023)
#   redis     — checkpointing de sessão do LangGraph
#   backend   — FastAPI + grafo de agentes (api/main.py)
#   frontend  — build React + nginx servindo estático e fazendo proxy de /api/*
#   worker    — curador (rodado sob demanda via cron externo)
#
# Portas expostas na VPS:
#   HTTP_PORT (default 80) → frontend/nginx — ÚNICA porta pública
#   127.0.0.1:8000         → backend (só localhost, pra debug via SSH tunnel)
#   127.0.0.1:6333         → qdrant dashboard (só localhost, pra demo/inspeção)
#
# Subir tudo:
#   docker compose up -d
# Rodar worker 1x:
#   docker compose run --rm worker
# Conferir saúde:
#   docker compose ps
#   docker stats --no-stream

name: banco-agil

# ── Blocos reutilizáveis ─────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Qdrant — banco vetorial (memória aprendida)
  # ──────────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: banco-agil-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - banco-agil-net
    ports:
      # Apenas loopback: acessível só da VPS (ou via SSH tunnel).
      # Dashboard: http://localhost:6333/dashboard (via tunnel)
      - "127.0.0.1:6333:6333"
    mem_reservation: 200M
    mem_limit: 500M
    logging: *default-logging
    healthcheck:
      # Qdrant retorna 200 em GET / com JSON de metadata
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Redis — estado de sessão (checkpointing LangGraph)
  # Volátil por design: TTL de 30min, sessões não persistem entre restarts.
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: banco-agil-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - "50mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - banco-agil-net
    mem_reservation: 20M
    mem_limit: 80M
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI + LangGraph (hot path do chat)
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: banco-agil-backend:latest
    container_name: banco-agil-backend
    restart: unless-stopped
    env_file:
      - .env
    # Estas variáveis SEMPRE vencem o que está no .env (nomes internos da rede)
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - banco-agil-data:/app/data
      # Volume nomeado (não bind mount) pra evitar conflito de UID:
      # o container roda como UID 1001 e um bind mount em pasta root-owned do host
      # quebraria o RotatingFileHandler. Docker cria o volume com owner correto.
      - banco-agil-logs:/app/logs
    networks:
      - banco-agil-net
    ports:
      # Só loopback: permite curl direto do host pra isolar bugs backend × nginx
      - "127.0.0.1:8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_reservation: 300M
    mem_limit: 700M
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — nginx servindo o build Vite e fazendo reverse proxy do backend
  # O próprio Dockerfile em frontend/ faz build multi-stage (node → nginx).
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    image: banco-agil-frontend:latest
    container_name: banco-agil-frontend
    restart: unless-stopped
    ports:
      # ÚNICA porta pública. Se 80 estiver ocupada, defina HTTP_PORT no .env.
      - "${HTTP_PORT:-80}:80"
    networks:
      - banco-agil-net
    depends_on:
      backend:
        condition: service_healthy
    mem_reservation: 10M
    mem_limit: 64M
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # Worker — curador (ADR-023). NÃO sobe por padrão.
  # Executar pelo cron da VPS: docker compose run --rm worker
  # ──────────────────────────────────────────────────────────────────────────
  worker:
    image: banco-agil-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banco-agil-worker
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - banco-agil-data:/app/data
      - banco-agil-logs:/app/logs
    command: ["python", "-m", "src.worker.curator", "--once", "--batch-size", "5"]
    networks:
      - banco-agil-net
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_reservation: 200M
    mem_limit: 500M
    logging: *default-logging
    profiles:
      - cron
    restart: "no"

# ── Volumes persistentes ─────────────────────────────────────────────────────
volumes:
  qdrant-data:
    name: banco-agil-qdrant-data
  banco-agil-data:
    name: banco-agil-data
  banco-agil-logs:
    name: banco-agil-logs

# ── Rede privada interna ─────────────────────────────────────────────────────
networks:
  banco-agil-net:
    name: banco-agil-net
    driver: bridge
